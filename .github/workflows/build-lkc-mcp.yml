name: build-lkc-mcp

on:
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本号（必须以 v 开头，如 v1.2.3）。留空则在 public 仓库最新 tag 基础上自动递增 patch。'
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: lkc-mcp
  SOURCE_REPO: ${{ vars.SOURCE_REPO || format('{0}/luckin-coupon-mcp', github.repository_owner) }}
  SOURCE_REF: main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout package repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_REF }}
          path: source
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # 始终从 public 仓库（当前 repo）拉取最新 tag
          latest_tag="$(git ls-remote --tags --refs "https://github.com/${GITHUB_REPOSITORY}.git" \
            | awk -F/ '{print $3}' \
            | sort -V \
            | tail -n 1)"

          if [[ -n "${INPUT_VERSION}" ]]; then
            # 手动输入版本号，必须以 v 开头
            if [[ ! "${INPUT_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version: '${INPUT_VERSION}'. Must match vMAJOR.MINOR.PATCH (e.g. v1.2.3)." >&2
              exit 1
            fi
            next_tag="${INPUT_VERSION}"
            docker_tag="${INPUT_VERSION#v}"
          elif [[ -z "${latest_tag}" ]]; then
            next_tag="v0.0.1"
            docker_tag="0.0.1"
          else
            if [[ "${latest_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              prefix="v"
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
            elif [[ "${latest_tag}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              prefix=""
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
            else
              echo "Unsupported tag format: ${latest_tag}" >&2
              exit 1
            fi

            next_tag="${prefix}${major}.${minor}.$((patch + 1))"
            docker_tag="${major}.${minor}.$((patch + 1))"
          fi

          # 校验新 tag 不与已存在 tag 冲突
          if [[ -n "${latest_tag}" ]]; then
            if git ls-remote --tags --refs "https://github.com/${GITHUB_REPOSITORY}.git" \
              | awk -F/ '{print $3}' | grep -Fxq "${next_tag}"; then
              echo "Tag '${next_tag}' already exists in ${GITHUB_REPOSITORY}." >&2
              exit 1
            fi
          fi

          image_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}"

          echo "latest_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "docker_tag=${docker_tag}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${image_ref,,}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./source
          file: ./source/Dockerfile
          push: true
          tags: |
            ${{ steps.version.outputs.image_ref }}:${{ steps.version.outputs.docker_tag }}
            ${{ steps.version.outputs.image_ref }}:latest
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ env.SOURCE_REPO }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Push git tag to public repo
        shell: bash
        env:
          NEW_TAG: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
          git push origin "refs/tags/${NEW_TAG}"

      - name: Workflow summary
        shell: bash
        run: |
          {
            echo "## Build Result"
            echo
            echo "- Source repo: \`${SOURCE_REPO}\`"
            echo "- Source ref: \`${SOURCE_REF}\`"
            echo "- Public repo: \`${GITHUB_REPOSITORY}\`"
            echo "- Latest public tag: \`${{ steps.version.outputs.latest_tag || 'none' }}\`"
            echo "- New git tag: \`${{ steps.version.outputs.version }}\`"
            echo "- Published image: \`${{ steps.version.outputs.image_ref }}:${{ steps.version.outputs.docker_tag }}\`"
            echo "- Published image: \`${{ steps.version.outputs.image_ref }}:latest\`"
          } >> "${GITHUB_STEP_SUMMARY}"
